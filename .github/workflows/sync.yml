name: Sync from Google Sheets

# Runs automatically every hour, or manually from the Actions tab on GitHub.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # every hour on the hour

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Sync F1 + F2 from Google Sheets
        run: python sync_sheets.py

      - name: Commit updated JSON files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/races_2026.json data/races_2026_f2.json data/db.json
          git diff --staged --quiet || git commit -m "Auto: sync F1 + F2 from Google Sheets"
          git push
