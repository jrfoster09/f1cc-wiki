name: Build JSON from CSV

on:
  push:
    paths:
      - 'data/csv/F1CC_2026.csv'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas

      - name: Run builder
        run: python build.py

      - name: Commit updated JSON files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/races_2026.json data/db.json
          git diff --staged --quiet || git commit -m "Auto: rebuild 2026 JSON from CSV [skip ci]"
          git push
