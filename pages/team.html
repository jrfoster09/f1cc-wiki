<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#35383d">
  <title>Team — F1CC Wiki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://unpkg.com/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous" async></script>
</head>
<body>

<a href="#main-content" class="skip-link">Skip to content</a>

<div class="sticky-header">
  <div class="topbar">
    <a href="../index.html" class="brand-link"><span class="brand">F1CC <span class="brand-acc">Wiki</span></span></a>
    <div class="tagline">Community Career &middot; Official Database</div>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="nav-links">
      <span></span><span></span><span></span>
    </button>
  </div>
  <nav class="nav-row" id="nav-links" aria-label="Site navigation">
    <a class="nav-link" href="../index.html">Home</a>
    <a class="nav-link" href="seasons.html">Seasons</a>
    <a class="nav-link" href="drivers.html">Drivers</a>
    <a class="nav-link active" href="teams.html">Teams</a>
    <a class="nav-link" href="records.html">Records</a>
    <a class="nav-link" href="elo.html">ELO</a>
    <a class="nav-link" href="radio.html">Radio Card</a>
    <a class="nav-link news-link" href="https://thated.github.io/F1CC-News-Site/index.html" target="_blank" rel="noopener">News ↗</a>
  </nav>
</div>

<div class="hero-strip" id="team-hero" style="border-bottom: 3px solid var(--team-color, var(--blue-accent))">
  <div class="hero-eyebrow">Constructor Profile</div>
  <h1 class="hero-title" id="hero-title">Loading…</h1>
  <p class="hero-sub" id="hero-sub"></p>
</div>

<main class="page-container" id="main-content">
  <a class="back-link" href="teams.html">← All Teams</a>
  <div id="content"><div style="color:var(--text-muted)">Loading…</div></div>
</main>

<footer><p>F1CC Wiki · <a href="../index.html">Home</a></p></footer>

<script src="../js/core.js"></script>
<script>
async function init() {
  DB = await fetch('../data/db.json').then(r=>r.json());
  const params = new URLSearchParams(window.location.search);
  const teamId = params.get('id');
  const team = DB.teams[teamId];
  if (!team) { document.getElementById('content').innerHTML='<p style="color:var(--text-muted)">Team not found.</p>'; return; }

  document.title = `${team.name} — F1CC Wiki`;
  document.getElementById('hero-title').textContent = team.name;
  document.documentElement.style.setProperty('--team-color', team.color);

  // Compute team stats
  let totalPoints=0, totalTitles=0, totalWins=0, totalPodiums=0;
  const seasonRows = [];
  Object.entries(DB.seasons).sort((a,b)=>b[0]-a[0]).forEach(([year,s]) => {
    const row = (s.constructor_standings||[]).find(r => r.team === teamId);
    if (row) {
      totalPoints += row.points;
      seasonRows.push({year, pos: row.pos, points: row.points});
    }
    if (s.champion_constructor === teamId) totalTitles++;
  });

  // Wins from race files
  for (const year of Object.keys(DB.seasons)) {
    try {
      const rd = await fetch(`../data/races_${year}.json`).then(r=>r.json());
      for (const race of rd.races) {
        if (race.status!=='complete') continue;
        race.results?.slice(0,1).forEach(r => { if(r.team===teamId) totalWins++; });
        race.results?.slice(0,3).forEach(r => { if(r.team===teamId) totalPodiums++; });
      }
    } catch(e) {}
  }

  // Drivers who drove for this team
  const teamDrivers = Object.entries(DB.drivers).filter(([,d]) =>
    Object.values(d.seasons||{}).some(s => s.team === teamId)
  );

  const tc = team.color;
  const r=parseInt(tc.slice(1,3),16),g=parseInt(tc.slice(3,5),16),b=parseInt(tc.slice(5,7),16);
  const pillStyle = `background:rgba(${r},${g},${b},0.18);color:${tc};border-color:rgba(${r},${g},${b},0.4)`;

  document.getElementById('hero-sub').textContent = `${seasonRows.length} season${seasonRows.length!==1?'s':''} · ${teamDrivers.length} drivers`;

  let html = `<div class="stat-grid mb-3">
    <div class="stat-card"><div class="s-label">Total Points</div><div class="s-val" style="color:${tc}">${totalPoints}</div></div>
    <div class="stat-card"><div class="s-label">Race Wins</div><div class="s-val" style="color:var(--gold)">${totalWins}</div></div>
    <div class="stat-card"><div class="s-label">Podiums</div><div class="s-val">${totalPodiums}</div></div>
    <div class="stat-card"><div class="s-label">Titles</div><div class="s-val">${totalTitles}</div></div>
  </div>`;

  // Team Principal
  if (team.team_principal) {
    html += `<div style="background:var(--navy-deep);border:1px solid var(--blue-border);border-radius:var(--radius-md);padding:1rem 1.25rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;">
      <div style="font-size:1.6rem">🎯</div>
      <div>
        <div style="font-size:10px;font-family:var(--font-display);letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-bottom:2px">Team Principal</div>
        <div style="font-size:1.1rem;font-weight:600;color:var(--text-primary)">${team.team_principal}</div>
      </div>
    </div>`;
  }

  // Season history
  html += `<div class="section-header mb-1"><span class="section-title">Season History</span></div>
  <table class="standings-table mb-3">
    <thead><tr><th>Season</th><th>Position</th><th>Points</th></tr></thead>
    <tbody>
    ${seasonRows.map(s => `<tr>
      <td><a class="driver-name-link" href="season.html?year=${s.year}">${s.year}</a></td>
      <td><div class="pos-badge ${s.pos===1?'p1':s.pos===2?'p2':s.pos===3?'p3':''}">${s.pos}</div></td>
      <td class="pts-cell">${s.points}</td>
    </tr>`).join('')}
    </tbody>
  </table>`;

  // Driver history
  html += `<div class="section-header mb-1"><span class="section-title">Drivers</span></div>
  <div class="driver-grid">
  ${teamDrivers.map(([id, d]) => {
    const driverSeasons = Object.entries(d.seasons||{}).filter(([,s])=>s.team===teamId).map(([y])=>y).sort().join(', ');
    return `<a class="driver-card" href="driver.html?id=${id}">
      <div class="driver-avatar" style="border-color:${tc}">
      ${d.photo
        ? `<img src="${d.photo}" alt="${d.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
        : d.flag_emoji}
    </div>
      <div class="driver-card-name">${d.name}</div>
      <div class="driver-card-meta">${driverSeasons}</div>
    </a>`;
  }).join('')}
  </div>`;

  document.getElementById('content').innerHTML = html;
}
init().then(() => {
  if (window.twemoji) twemoji.parse(document.body, {folder:'svg', ext:'.svg'});
});
</script>
</body>
</html>
